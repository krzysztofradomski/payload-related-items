name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test:int -- --reporter=verbose

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          PAYLOAD_SECRET: '123'
        run: pnpm build

  report:
    name: Post CI results
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [typecheck, lint, test, build]
    if: always()
    steps:
      - name: Post CI results as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const typecheck = process.env.TYPECHECK_RESULT;
            const lint = process.env.LINT_RESULT;
            const test = process.env.TEST_RESULT;
            const build = process.env.BUILD_RESULT;

            const icon = (result) => result === 'success' ? '✅' : '❌';
            const allPassed = [typecheck, lint, test, build].every(r => r === 'success');

            let body = `## ${allPassed ? '✅ CI Passed' : '❌ CI Failed'}\n\n`;
            body += `| Job | Status |\n|-----|--------|\n`;
            body += `| Typecheck | ${icon(typecheck)} ${typecheck} |\n`;
            body += `| Lint | ${icon(lint)} ${lint} |\n`;
            body += `| Test | ${icon(test)} ${test} |\n`;
            body += `| Build | ${icon(build)} ${build} |\n\n`;
            body += `\n---\n*🤖 Posted by CI workflow — [View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})*`;

            const marker = '<!-- ci-results-comment -->';
            body = marker + '\n' + body;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

            if (!allPassed) {
              throw new Error('One or more CI jobs failed.');
            }
        env:
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
